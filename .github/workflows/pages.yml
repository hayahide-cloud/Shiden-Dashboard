name: Deploy Dashboard to GitHub Pages

# 資産ダッシュボード（正本ミラー）を GitHub Pages に公開する。
# configure-pages の enablement:true により、Pages 未有効でも
# ワークフロー内から自動で有効化する（設定画面の手動トグル不要）。
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# 同時デプロイを抑制（進行中は待機、キャンセルしない）
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Pages（未有効なら自動で有効化）
        uses: actions/configure-pages@v5
        with:
          enablement: true
      - name: Upload artifact（リポジトリルートを公開対象に）
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
